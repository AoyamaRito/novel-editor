<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>novel-editor</title>
<style>
  :root { --accent: #2f6f4f; --bg: #fafaf7; --ink: #222; }
  * { box-sizing: border-box; margin: 0; }
  body { background: var(--bg); color: var(--ink); font-family: "Hiragino Mincho ProN", "Yu Mincho", serif; display: flex; flex-direction: column; height: 100vh; }
  header { display: flex; align-items: center; gap: 12px; padding: 8px 16px; border-bottom: 1px solid #ddd; font-family: sans-serif; font-size: 13px; }
  header .title { font-weight: 600; color: var(--accent); }
  header button { font-size: 12px; padding: 3px 10px; border: 1px solid #bbb; background: #fff; border-radius: 3px; cursor: pointer; }
  header button:hover { border-color: var(--accent); color: var(--accent); }
  #mic.rec { background: #d23b2f; color: #fff; border-color: #d23b2f; }
  #mode { font-size: 16px; width: 24px; text-align: center; color: var(--accent); font-weight: bold; }
  #count { color: #888; margin-left: auto; }
  #text { flex: 1; overflow-y: auto; padding: 24px 32px 48vh; font-size: 17px; line-height: 2.0; white-space: pre-wrap; word-break: break-all; outline: none; position: relative; }
  .mark { background: #dcefe5; border-bottom: 2px solid var(--accent); }
  .cand { background: var(--accent); color: #fff; border-radius: 2px; padding: 0 2px; }
  .conv-flash { color: var(--accent); background: #dcefe5; border-radius: 2px; }
  .pend { color: #1e56c8; border-bottom: 1px dotted #1e56c8; }
  .ghost { color: #a9c4ef; }
  .closers { color: #b0a698; }
  .nl { color: #cdc5b4; font-size: 11px; user-select: none; }
  .tatewrap { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  #pgbar { width: 58%; accent-color: var(--accent); direction: rtl; }
  #curline { position: absolute; left: 0; right: 0; height: 2.1em; background: rgba(47,111,79,.07); pointer-events: none; z-index: 0; }
  .vl.cur-line { background: rgba(47,111,79,.09); box-shadow: inset 2px 0 0 rgba(60,90,70,.09), inset -2.5px 0 0 rgba(47,111,79,.5); } /* 現在行: 左は罫線・右はマーカー */
  .candinfo { font-size: 11px; color: #999; font-family: sans-serif; }
  .caret { display: inline-block; width: 2px; height: 1.1em; background: var(--accent); vertical-align: text-bottom; animation: blink 1s step-start infinite; }
  @keyframes blink { 50% { opacity: 0; } }
  #charts { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); z-index: 5; display: flex; gap: 24px; justify-content: center; padding: 5px 10px; border: 1px solid #ddd; border-radius: 8px; background: rgba(242,242,238,.93); box-shadow: 0 2px 10px rgba(0,0,0,.08); }
  .chart h3 { font-family: sans-serif; font-size: 11px; color: #777; text-align: center; margin-bottom: 4px; font-weight: normal; }
  .krow { display: flex; justify-content: center; }
  .krow:nth-child(2) { margin-left: 14px; }
  .krow:nth-child(3) { margin-left: 0; }
  .key { width: 31px; height: 38px; border: 1px solid #ccc; border-radius: 4px; background: #fff; margin: 1.5px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1px; position: relative; }
  .key .chord { display: block; font-size: 10px; line-height: 1; opacity: .75; }
  .key .kana { font-size: 13px; line-height: 1; }
  body.shift-held #chart .key .kana { opacity: .18; }
  body.shift-held #chart .key .chord { font-size: 14px; opacity: 1; }
  #chart .key.hint-chord .chord { font-size: 14px; opacity: 1; }
  .key .label { font-size: 7px; color: #aaa; font-family: monospace; position: absolute; bottom: 1px; right: 3px; }
  .key .gyo-0 { color: #f00000; font-weight: 600; }
  .key .gyo-1 { color: #ff7070; font-weight: 600; }
  .key .gyo-2 { color: #00a626; font-weight: 600; }
  .key .gyo-3 { color: #004d0f; font-weight: 600; }
  .key .gyo-4 { color: #0066ff; font-weight: 600; }
  .key .gyo-5 { color: #001f7a; font-weight: 600; }
  .key .gyo-6 { color: #000000; font-weight: 600; }
  .key .gyo-7 { color: #8c8c8c; font-weight: 600; }
  .key .gyo-8 { color: #b400e0; font-weight: 600; }
  .key .gyo-9 { color: #4b0082; font-weight: 600; }
  .key .small-kana { color: #9e2b25 !important; font-weight: bold; }
  .key.home { border: 3px solid #1e2f5e; }
  .key.cross { background: #e3f1e9; border-color: #a7cfba; }
  .key.shiftkey { width: 48px; background: #f4f2ea; }
  .key.shiftkey .kana { color: #888; font-size: 12px; display: block !important; }
  .key.hit { background: var(--accent); border-color: var(--accent); }
  .key.hit .kana, .key.hit .chord { color: #fff; }
  footer { display: flex; gap: 16px; padding: 4px 16px; font-family: monospace; font-size: 11px; color: #888; border-top: 1px solid #e5e5e0; }
  #mainrow { flex: 1; display: flex; min-height: 0; }
  #sidebar { width: 76px; flex: none; display: flex; flex-direction: column; gap: 5px; padding: 10px 6px; border-right: 1px solid #ddd; background: #f4f4f0; font-family: sans-serif; overflow-y: auto; }
  #sidebar button { font-size: 11px; padding: 5px 2px; border: 1px solid #bbb; background: #fff; border-radius: 4px; cursor: pointer; width: 100%; }
  #sidebar button:hover { border-color: var(--accent); color: var(--accent); }
  #sidebar select { font-size: 10px; width: 100%; border: 1px solid #bbb; border-radius: 3px; background: #fff; }
  #sidebar hr { border: none; border-top: 1px solid #ddd; margin: 3px 0; }
  #memo-panel { width: 270px; flex: none; display: none; flex-direction: column; border-left: 1px solid #ddd; background: #fbfaf4; }
  body.with-memo #memo-panel { display: flex; }
  #memo-panel h3 { font-family: sans-serif; font-size: 12px; color: var(--accent); padding: 8px 10px 4px; font-weight: 600; }
  #memo-panel .memo-note { font-size: 9px; color: #aaa; font-weight: normal; }
  #memo { flex: 1; border: none; outline: none; resize: none; background: transparent; padding: 6px 10px 12px; font-family: inherit; font-size: 13px; line-height: 1.8; color: #333; border-top: 1px solid #e7e3d5; }
  #toc { max-height: 42%; overflow-y: auto; font-family: sans-serif; font-size: 12px; padding: 0 6px 8px; }
  #toc .ep { padding: 4px 8px; border-radius: 4px; cursor: pointer; color: #444; }
  #toc .ep .eprow { display: flex; justify-content: space-between; gap: 6px; }
  #toc .ep .sum { font-size: 10px; color: #999; margin-top: 1px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; pointer-events: none; }
  #toc .ep .sp { font-size: 10px; color: #777; padding: 2px 0 2px 14px; border-left: 2px solid #dfe8e2; margin: 1px 0 1px 4px; cursor: pointer; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #toc .ep .sp:hover { color: var(--accent); border-left-color: var(--accent); }
  #toc .ep:hover { background: #eef3ec; }
  #toc .ep.cur { background: #dcefe5; color: var(--accent); font-weight: 600; }
  #toc .ep .len { color: #aaa; font-size: 10px; flex: none; }
  #text.ov { font-family: sans-serif; padding: 22px 34px; background: #ece9df; }
  body.ov-full #sidebar, body.ov-full #memo-panel, body.ov-full #charts { display: none; }
  .ovhead { font-size: 16px; font-weight: 700; color: var(--accent); margin-bottom: 18px; }
  .ovhead .ovnote { font-size: 11px; color: #aaa; font-weight: normal; margin-left: 14px; }
  .ovgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 16px; }
  .ovcard { border: 1px solid #d5cfbe; border-radius: 10px; background: #fffdf6; padding: 14px 16px 12px; cursor: pointer; box-shadow: 0 2px 6px rgba(0,0,0,.07); min-height: 150px; transition: transform .08s; }
  .ovcard:hover { border-color: var(--accent); box-shadow: 0 4px 14px rgba(47,111,79,.22); transform: translateY(-2px); }
  .ovtitle { font-size: 16px; font-weight: 700; color: #2a2a26; display: flex; justify-content: space-between; align-items: baseline; border-bottom: 2px solid #e8e2d0; padding-bottom: 6px; }
  .ovtitle .ovlen { color: #aaa; font-size: 11px; font-weight: normal; }
  .ovsum { font-size: 12.5px; color: var(--accent); font-weight: 600; margin-top: 7px; }
  .ovbody { font-family: "Hiragino Mincho ProN", "Yu Mincho", serif; font-size: 12px; color: #777; margin-top: 8px; white-space: pre-wrap; line-height: 1.8; max-height: 130px; overflow: hidden; mask-image: linear-gradient(#000 60%, transparent); -webkit-mask-image: linear-gradient(#000 60%, transparent); }
  #keycode { color: var(--accent); min-width: 90px; }
  header select { font-size: 12px; padding: 2px; border: 1px solid #bbb; border-radius: 3px; background: #fff; max-width: 220px; }
  #micsel { max-width: 110px; }
  #text.flash { background: #fbe9e7; }
  #text.tate { display: flex; align-items: center; justify-content: center; padding: 2px; background: #efece4; }
  .spread { display: flex; flex-direction: row-reverse; gap: 12px; }
  .page { background: #fffdf8; border: 1px solid #d8d2c4; box-shadow: 0 2px 8px rgba(0,0,0,.10); padding: 8px 8px 0; position: relative; }
  .pagein { writing-mode: vertical-rl; text-orientation: mixed; font-feature-settings: "vpal" 1, "vkrn" 1; font-size: min(calc((100vh - 118px) / 44), calc((100vw - 170px) / 66)); line-height: 1.85; height: 42em; width: calc(17 * 1.85em); }
  body.with-chart .pagein { font-size: min(calc((100vh - 268px) / 44), calc((100vw - 170px) / 66)); }
  body.with-chart #text.tate { padding-bottom: 158px; }
  body.with-memo .pagein { font-size: min(calc((100vh - 118px) / 44), calc((100vw - 440px) / 66)); }
  body.with-chart.with-memo .pagein { font-size: min(calc((100vh - 268px) / 44), calc((100vw - 440px) / 66)); }
  .pagein .vl { height: 42em; box-shadow: inset 2px 0 0 rgba(60,90,70,.09), inset -2px 0 0 rgba(60,90,70,.09); } /* 原稿用紙式: 行の左右に二重罫線(行自身に描くのでズレない) */
  .pagein .caret { display: inline-block; width: 1em; height: 3px; background: #c2571a; }
  .pageno { text-align: center; font-family: sans-serif; font-size: 9px; color: #aaa; padding: 2px 0 3px; }
  #text.tut { display: flex; align-items: center; justify-content: center; }
  .drill { text-align: center; font-family: sans-serif; }
  .drill .stagename { font-size: 13px; color: #888; margin-bottom: 18px; }
  .drill .target { font-size: 30px; font-family: "Hiragino Mincho ProN", "Yu Mincho", serif; letter-spacing: 4px; margin-bottom: 14px; }
  .drill .target .done { color: #bbb; }
  .drill .target .cur { color: var(--accent); border-bottom: 3px solid var(--accent); }
  .drill .target .rest { color: var(--ink); }
  .drill .target .yomi { font-size: 16px; color: #999; margin-left: 10px; }
  .drill .target.long { font-size: 19px; letter-spacing: 2px; }
  .drill .target.long .yomi { display: block; font-size: 13px; margin-top: 6px; }
  .drill .typed { font-size: 22px; font-family: "Hiragino Mincho ProN", "Yu Mincho", serif; min-height: 36px; color: var(--accent); }
  .drill .hintline { font-size: 14px; color: #777; margin-top: 12px; min-height: 20px; }
  .drill .stats { font-size: 11px; color: #aaa; margin-top: 20px; }
  @keyframes glowG { 0%,100% { box-shadow: 0 0 4px 2px rgba(47,111,79,.95); } 50% { box-shadow: 0 0 20px 8px rgba(47,111,79,.45); } }
  @keyframes glowO { 0%,100% { box-shadow: 0 0 4px 2px rgba(194,87,26,.95); } 50% { box-shadow: 0 0 20px 8px rgba(194,87,26,.45); } }
  .key.hint { border-color: var(--accent); background: #e7f6ee; transform: scale(1.18); z-index: 2; animation: glowG .8s ease-in-out infinite; }
  .key.hint .kana { color: var(--accent) !important; font-weight: bold; font-size: 19px; }
  .key.hint-chord { border-color: #c2571a; background: #fdf0e6; transform: scale(1.18); z-index: 2; animation: glowO .8s ease-in-out infinite; }
  .key.hint-chord .chord { color: #c2571a !important; font-weight: bold; font-size: 16px; }
#chart .numrow .key.spacer{visibility:hidden}
#chart .key.fnkey{background:#f3eee2;border-color:#c9b98f}
#chart .key.fnkey .kana{color:#7a5c1e}
#chart .key.fnkey .label{color:#7a5c1e;font-weight:700}
body.abc #text{background:#eef4ff}
body.abc #chart .kana,body.abc #chart .chord{opacity:.12}
body.abc #chart .key .label{font-size:1.1em;font-weight:800;color:#1d3a6e}
body.abc #chart .key.fnkey .kana{opacity:1;color:#7a5c1e}
#chart .key.fnkey .kana{display:block !important}
.key.hint .kana{display:block !important}
.pagein .tcy{text-combine-upright:all}
</style>
</head>
<body>
  <header>
    <span class="title">novel-editor</span>
    <span id="filename" style="font-weight:600;color:#2f6f4f;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span>
    <select id="doc" title="話の切替"></select>
    <button id="newdoc" title="新しい話を作る">＋</button>
    <span id="mode">─</span>
    <input type="file" id="imp-file" accept=".json" style="display:none">
    <span id="count"></span>
  </header>
  <div id="mainrow">
    <nav id="sidebar">
      <button id="openfile" title="作品フォルダを開く(空フォルダ=新作)">開く</button>
      <button id="newfile" title="(未使用)">新規</button>
      <button id="renamedoc" title="改名">改名</button>
      <button id="tate" title="縦書き(電撃文庫: 42字×17行・見開き)">横</button>
      <button id="chartbtn" title="キー配列の表示/非表示">盤</button>
      <button id="sound" title="効果音">♪</button>
      <button id="llm" title="ローカルLLM審査員(2モデル合議)">審…</button>
      <button id="memobtn" title="目次とメモ(メモは作品フォルダの memo.txt。証明の対象外)">目次</button>
      <button id="ovbtn" title="俯瞰: 全話をカードで見渡す(クリックで移動)">俯瞰</button>
      <hr>
      <button id="save" title="保存(自動保存もあり)">保存</button>
      <button id="export" title="本文txtを書き出す">書出</button>
      <button id="cert" title="著者証明レポートを発行(チェーン検証+統計+外部由来開示)">証</button>
      <button id="exp-json" title="バックアップJSON(学習+設定+チェーン頭)">⬇json</button>
      <button id="imp-json" title="バックアップJSONから復元">⬆json</button>
      <hr>
      <button id="tut-btn" title="練習モード">練習</button>
      <select id="tut-stage"></select>
      <button id="mic" title="音声入力(休眠中)">🎤</button>
      <select id="micsel" title="マイクの選択"></select>
      <button id="vcal" title="声合わせ(休眠中)">声</button>
    </nav>
    <div id="text"></div>
    <aside id="memo-panel">
      <h3>目次</h3>
      <div id="toc"></div>
      <h3>メモ <span class="memo-note">(memo.txt・OSのIMEで・証明対象外)</span></h3>
      <textarea id="memo" placeholder="プロット・固有名詞・伏線など。&#10;ここはOSの日本語入力で書けます。"></textarea>
    </aside>
  </div>
  <div id="charts">
    <div class="chart"><div id="chart"></div></div>
  </div>
  <footer>
    <span>code: <span id="keycode">─</span></span>
    <span id="status"></span>
    <span>よみ→ Space=変換(Enter=決定)・ ：=カタカナ/ひらがなに開く ・ 4578=だでじが ・ Tab=予測確定 ・ Shift+キー=シフト面 ・ F1〜F10=数字 ・ 戻る=英数/Option ・ ABC=@(Pの隣) ・ ゛=変形</span>
  </footer>
  <script type="module" src="./editor.js"></script>
</body>
</html>
